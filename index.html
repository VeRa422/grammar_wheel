<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Luxor: The Maze of Lost Souls</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Philosopher:wght@400;700&display=swap');

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background: #000;
            font-family: 'Philosopher', sans-serif;
            cursor: crosshair;
        }

        /* Фоновое изображение лабиринта */
        .tomb {
            position: relative; width: 100vw; height: 100vh;
            background: 
                radial-gradient(circle, rgba(42, 31, 5, 0.4) 0%, rgba(0, 0, 0, 0.9) 100%),
                url('2.png') center/cover no-repeat;
            display: none;
            flex-direction: column; justify-content: center; align-items: center;
        }

        #custom-cursor {
            position: fixed; width: 20px; height: 20px;
            border: 2px solid #ffd700; border-radius: 50%;
            pointer-events: none; z-index: 9999;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 15px #ffd700;
        }

        .overlay-screen {
            position: fixed; inset: 0; 
            background: rgba(0,0,0,0.85); 
            display: flex; z-index: 5000; 
            flex-direction: column; justify-content: center; align-items: center;
        }

        .victory-fade-in {
            animation: longFade 2.5s ease-out forwards;
        }

        @keyframes longFade {
            0% { opacity: 0; transform: scale(0.9); filter: blur(10px); }
            100% { opacity: 1; transform: scale(1); filter: blur(0); }
        }

        .gold-text {
            font-family: 'Cinzel Decorative'; 
            color: #ffd700; font-size: 50px; text-align: center;
            text-shadow: 0 0 30px rgba(212, 175, 55, 0.5);
            margin-bottom: 40px;
        }

        /* Кнопки */
        .game-btn {
            padding: 18px 60px; 
            background: linear-gradient(#ffd700, #b8860b);
            border: 3px solid #5c4306; border-radius: 12px;
            font-family: 'Cinzel Decorative'; font-size: 20px; 
            color: #1a1403; cursor: pointer; transition: 0.2s;
            box-shadow: 0 8px 0 #5c4306; text-transform: uppercase;
        }
        .game-btn:active { transform: translateY(4px); box-shadow: 0 4px 0 #5c4306; }

        /* Колесо */
        .wheel-box { position: relative; width: 440px; height: 440px; }
        .static-scarab {
            position: absolute; width: 80px; height: 80px;
            background: url('1.png') center/contain no-repeat;
            right: -50px; top: 50%; margin-top: -40px;
            transform: rotate(-90deg);
            filter: drop-shadow(0 0 15px #ffd700);
            z-index: 100; pointer-events: none;
            animation: pushEffort 1s infinite ease-in-out;
        }
        @keyframes pushEffort {
            0%, 100% { transform: rotate(-90deg) translateX(0); }
            50% { transform: rotate(-90deg) translateX(-5px); }
        }
        .main-wheel {
            width: 100%; height: 100%; border-radius: 50%;
            border: 10px solid #8a6d1c; background: rgba(10, 8, 2, 0.95);
            position: relative; transition: transform 0.2s cubic-bezier(0.1, 0, 0.2, 1);
            box-shadow: 0 0 40px rgba(0,0,0,0.5), inset 0 0 30px #000;
        }
        .word-item {
            position: absolute; left: 50%; top: 50%; width: 170px;
            margin-left: -200px; transform-origin: 200px center;
            display: flex; justify-content: flex-start; align-items: center;
        }
        .word-text { color: #5a4814; font-size: 18px; font-weight: bold; transition: 0.3s; white-space: nowrap; }
        .active-word .word-text { color: #fff; font-size: 28px; text-shadow: 0 0 15px #ffd700; }

        /* Карточки */
        .game-layout { display: flex; align-items: center; gap: 60px; z-index: 10; margin-top: 30px; }
        .card-stack { position: relative; width: 420px; height: 160px; perspective: 1500px; }
        .quest-card {
            position: absolute; width: 100%; height: 100%;
            background: linear-gradient(135deg, #d4af37 0%, #a67c00 50%, #5c4306 100%);
            border: 3px solid #3d2b04; border-radius: 12px;
            display: flex; justify-content: center; align-items: center;
            color: #1a1403; font-size: 22px; font-weight: bold; text-align: center; padding: 20px;
            box-sizing: border-box; box-shadow: 0 10px 25px rgba(0,0,0,0.7);
            transition: transform 0.6s cubic-bezier(0.19, 1, 0.22, 1), opacity 0.4s;
        }
        .card-active { transform: translateZ(0) translateY(0); z-index: 10; border-color: #ffd700; }
        .card-exit { transform: translate(600px, -300px) rotate(45deg); opacity: 0 !important; }
        .card-shake { animation: shake 0.4s; background: linear-gradient(135deg, #a32a2a, #5c0606) !important; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-10px); } 75% { transform: translateX(10px); } }

        .blank-space { color: #fff; border-bottom: 2px solid #1a1403; margin: 0 8px; min-width: 80px; display: inline-block; }

        /* Управление звуком */
        .audio-control {
            position: absolute; top: 20px; right: 20px;
            display: flex; align-items: center; gap: 10px;
            background: rgba(0,0,0,0.6); padding: 10px 15px;
            border-radius: 30px; border: 1px solid #8a6d1c; z-index: 1000;
        }
        .audio-control label { color: #ffd700; font-size: 12px; font-family: 'Cinzel Decorative'; }
        input[type=range] {
            cursor: pointer; accent-color: #ffd700; width: 80px;
        }

        /* Эффекты */
        #flash-red { position: fixed; inset: 0; pointer-events: none; z-index: 4000; opacity: 0; background: rgba(255, 0, 0, 0.2); }
        .shock-anim { animation: shock 0.4s; }
        @keyframes shock { 0% { opacity: 1; } 100% { opacity: 0; } }
        .sand-particle { position: fixed; background: #ffd700; border-radius: 50%; pointer-events: none; z-index: 6000; }
    </style>
</head>
<body>

<div id="custom-cursor"></div>
<div id="flash-red"></div>

<div class="audio-control">
    <label>Volume</label>
    <input type="range" id="vol-slider" min="0" max="1" step="0.1" value="0.5">
</div>

<div id="start-screen" class="overlay-screen">
    <button class="game-btn" onclick="startGame()">Enter the Maze</button>
</div>

<div id="victory-screen" class="overlay-screen" style="display: none;">
    <div class="gold-text">ALL SEALS ARE BROKEN!<br>
        <span style="font-size: 20px;">The way to the Sphinx's Chamber is open.</span>
    </div>
    <button class="game-btn" onclick="resetGame()">Continue Journey</button>
</div>

<div class="tomb" id="game-view">
    <div id="progress-bar" style="position: absolute; top: 40px; display: flex; gap: 12px;"></div>

    <div class="game-layout">
        <div class="card-stack" id="deck"></div>
        <div style="font-size: 40px; color: #ffd700; filter: drop-shadow(0 0 10px #ffd700);">➔</div>
        
        <div class="wheel-box">
            <div class="main-wheel" id="wheel-inner"></div>
            <div class="static-scarab"></div>
        </div>
    </div>

    <button class="game-btn" id="unlock-btn" style="margin-top: 40px;">Activate Seal</button>
</div>

<script>
    const sndCorrect = new Audio('1.mp3');
    const sndWrong = new Audio('2.mp3');
    const sndTick = new Audio('3.mp3');
    const sndVictory = new Audio('4.mp3');

    const volSlider = document.getElementById('vol-slider');
    const cursor = document.getElementById('custom-cursor');
    const wheel = document.getElementById('wheel-inner');
    const deck = document.getElementById('deck');
    const flashRed = document.getElementById('flash-red');
    const unlockBtn = document.getElementById('unlock-btn');
    const gameView = document.getElementById('game-view');
    const startScreen = document.getElementById('start-screen');
    const victoryScreen = document.getElementById('victory-screen');

    const grammarData = [
        { q: "The Sphinx ___ a lion body.", a: "has got" },
        { q: "There ___ many secrets in Egypt.", a: "are" },
        { q: "___ you see the golden light?", a: "can" },
        { q: "The Nile ___ a very long river.", a: "is" },
        { q: "The priests ___ magic scrolls.", a: "have got" },
        { q: "Ra is ___ than the serpent.", a: "stronger" },
        { q: "The maze ___ ten magic seals.", a: "has got" },
        { q: "Ancient pyramids ___ very old.", a: "are" },
        { q: "A pharaoh ___ a gold mask.", a: "has got" },
        { q: "___ the gates open now?", a: "can" }
    ];

    const options = ["am", "stronger", "is", "are", "isn't", "aren't", "have got", "has got", "haven't got", "hasn't got", "can", "can't"];
    let currentQuestIdx = 0;
    let totalRotation = 0;
    const step = 360 / options.length;

    // Управление громкостью
    function updateVolume() {
        const v = volSlider.value;
        sndCorrect.volume = v;
        sndWrong.volume = v;
        sndTick.volume = v * 0.4;
        sndVictory.volume = v;
    }
    volSlider.addEventListener('input', updateVolume);
    updateVolume();

    function startGame() {
        startScreen.style.display = 'none';
        gameView.style.display = 'flex';
        init();
    }

    function init() {
        const progBar = document.getElementById('progress-bar');
        progBar.innerHTML = '';
        deck.innerHTML = '';
        wheel.innerHTML = '';
        
        // Создаем слоты для печатей (3.png)
        grammarData.forEach((_, i) => {
            const slot = document.createElement('div');
            slot.style.cssText = "width: 45px; height: 45px; border: 1px solid rgba(212,175,55,0.4); border-radius: 50%; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center;";
            slot.innerHTML = `<img src="3.png" id="seal-${i}" style="width: 80%; opacity: 0; transition: 0.5s; filter: drop-shadow(0 0 5px gold);">`;
            progBar.appendChild(slot);
        });

        // Карточки
        for (let i = grammarData.length - 1; i >= 0; i--) {
            const card = document.createElement('div');
            card.className = 'quest-card';
            card.id = `card-${i}`;
            card.innerHTML = grammarData[i].q.replace("___", `<span class="blank-space">?</span>`);
            deck.appendChild(card);
        }

        // Колесо
        options.forEach((opt, i) => {
            const container = document.createElement('div');
            container.className = 'word-item';
            container.style.transform = `rotate(${i * step}deg)`;
            container.innerHTML = `<div class="word-text">${opt}</div>`;
            wheel.appendChild(container);
        });
        updateWordsOrientation();
        updateStackStyles();
    }

    function updateStackStyles() {
        const cards = Array.from(document.querySelectorAll('.quest-card:not(.card-exit)'));
        cards.forEach((card, i) => {
            card.classList.remove('card-active');
            if (i === cards.length - 1) card.classList.add('card-active');
        });
    }

    function updateWordsOrientation() {
        const nodes = document.querySelectorAll('.word-item');
        let normalized = ((-totalRotation % 360) + 360) % 360;
        let activeIdx = Math.round(normalized / step) % options.length;
        nodes.forEach((node, i) => {
            node.querySelector('.word-text').style.transform = `rotate(${- (i * step) - totalRotation}deg)`;
            node.classList.toggle('active-word', i === activeIdx);
        });
    }

    window.addEventListener('mousemove', (e) => {
        cursor.style.left = e.clientX + 'px';
        cursor.style.top = e.clientY + 'px';
    });

    window.addEventListener('wheel', (e) => {
        if (gameView.style.display === 'none') return;
        totalRotation += e.deltaY > 0 ? -step : step;
        wheel.style.transform = `rotate(${totalRotation}deg)`;
        const tick = sndTick.cloneNode();
        tick.volume = volSlider.value * 0.3;
        tick.play();
        updateWordsOrientation();
    });

    unlockBtn.addEventListener('click', () => {
        let normalized = ((-totalRotation % 360) + 360) % 360;
        let selIdx = Math.round(normalized / step) % options.length;
        let chosen = options[selIdx];
        
        const activeCard = document.getElementById(`card-${currentQuestIdx}`);
        if (!activeCard) return;

        if (chosen === grammarData[currentQuestIdx].a) {
            sndCorrect.play();
            activeCard.querySelector('.blank-space').innerText = chosen;
            activeCard.classList.add('card-exit');
            
            // Проявляем печать
            const seal = document.getElementById(`seal-${currentQuestIdx}`);
            if(seal) { seal.style.opacity = "1"; seal.style.transform = "scale(1.2)"; setTimeout(()=>seal.style.transform="scale(1)", 300); }

            setTimeout(() => {
                currentQuestIdx++;
                updateStackStyles();
                if (currentQuestIdx >= grammarData.length) {
                    sndVictory.play();
                    victoryScreen.style.display = 'flex';
                    victoryScreen.classList.add('victory-fade-in');
                }
            }, 400);
        } else {
            sndWrong.play();
            activeCard.classList.add('card-shake');
            flashRed.classList.add('shock-anim');
            setTimeout(() => {
                activeCard.classList.remove('card-shake');
                flashRed.classList.remove('shock-anim');
            }, 400);
        }
    });

    function resetGame() {
        // Здесь можно добавить переход на другой HTML файл или слайд:
        // window.location.href = "sphinx.html";
        location.reload(); 
    }
</script>
</body>
</html>
